description: "Ce projet implémente les opérateurs de navigation du système PlatonAAV,
    une API REST FastAPI permettant de gérer la progression des apprenants à travers
    les Aptitudes et Acquis Visés (AAV). L'API expose des endpoints pour identifier
    les AAV accessibles, en cours, bloqués et à réviser, en s'appuyant sur un système
    de prérequis et de révision espacée avec mise en cache des résultats."